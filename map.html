<!DOCTYPE html>
<html lang="en-ZA">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">

  <title>Backpacking South Africa - 3D Interactive Map</title>

  <meta name="description" content="This map shows the locations of all the backpackers hostels in South Africa. Click the icons to see full contact details and reviews.">

  <link rel="preconnect" href="https://api.maptiler.com">
  <link rel="dns-prefetch" href="https://api.maptiler.com">
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="dns-prefetch" href="https://unpkg.com">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #FFD700; /* brand yellow — matches map loading colour */
    }
    #bb-map-wrap {
      width: 100%;
      height: 100%;
    }
    #map-shield {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.08);
    }
    #map-shield span {
      background: rgba(0,0,0,0.55);
      color: #fff;
      padding: 8px 16px;
      border-radius: 20px;
      font-family: 'Century Gothic', sans-serif;
      font-size: 13px;
      pointer-events: none;
    }
    /* Only show the shield on touch devices */
    @media (hover: hover) {
      #map-shield { display: none; }
    }

.map-shield-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }
    
    .overlay-circle {
      background: #fff200;
      color: #000;
      padding: 15px;
      border-radius: 50px;
      text-align: center;
      font-weight: bold;
      max-width: 80%;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
font-family: 'Century Gothic', sans-serif; /* Ensures correct font */
  font-weight: bold;                        /* Ensures bold weight */
  border: 2px solid #ffffff;                /* Adds the white outline */
    }

  </style>

</head>
<body>

<h1 style="position: absolute; left: -9999px;">Interactive Backpacking Map of South Africa</h1>

<!-- Tap-to-interact overlay — prevents map swallowing scroll on mobile.
     Hidden automatically on desktop (hover: hover media query above).
     Dismissed by the user's first tap on mobile. -->
<div id="map-shield">
      <div class="map-shield-content">
        <span>We list ALL the hostels in South Africa! Click the icons for info.</span>
        </div>
      </div>
    </div>

<div id="bb-map-wrap"></div>

<div style="display:none;">
    <p>Interactive 3D map showing all the backpackers hostels in South Africa. Includes hostel locations, contact information, and reviews.</p>
  </div>

<script>
  // Dismiss the shield on first tap
  document.getElementById('map-shield').addEventListener('click', function () {
    this.remove();
  }, { once: true });
</script>

<script>
  // Read config from URL parameters
  // e.g. /map.html?region=cape-town&center=18.412,-33.937&zoom=13&pitch=60&bearing=180
  // Mobile overrides: &mobile-center=18.412,-33.857&mobile-zoom=11.5
  (function () {
    var p = new URLSearchParams(window.location.search);
    var isMobile = window.innerWidth <= 768;

    function parseCenter(str) {
      if (!str) return null;
      var parts = str.split(',').map(Number);
      return (parts.length === 2 && !parts.some(isNaN)) ? parts : null;
    }

    var centerDesktop = parseCenter(p.get('center'));
    var centerMobile  = parseCenter(p.get('mobile-center'));
    var zoomDesktop   = p.has('zoom')         ? Number(p.get('zoom'))         : undefined;
    var zoomMobile    = p.has('mobile-zoom')  ? Number(p.get('mobile-zoom'))  : undefined;
    var pitch         = p.has('pitch')        ? Number(p.get('pitch'))        : undefined;
    var bearing       = p.has('bearing')      ? Number(p.get('bearing'))      : undefined;

    window.BB_MAP_CONFIG = {
      region:  p.get('region') || 'national',
      center:  (isMobile && centerMobile) ? centerMobile : (centerDesktop || [23.68, -29.92]),
      zoom:    (isMobile && zoomMobile  !== undefined) ? zoomMobile  : zoomDesktop,
      pitch:   pitch,
      bearing: bearing
    };

    // Remove undefined keys so hostel-map.js falls back to its own defaults
    Object.keys(window.BB_MAP_CONFIG).forEach(function(k) {
      if (window.BB_MAP_CONFIG[k] === undefined) delete window.BB_MAP_CONFIG[k];
    });
  }());
</script>

<script src="/assets/js/hostel-map.js" defer></script>

</body>
</html>
