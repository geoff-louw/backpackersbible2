<!DOCTYPE html>
<html lang="en-ZA">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">

  <title>Hostel Map — The Backpacker's Bible</title>

  <link rel="preconnect" href="https://api.maptiler.com">
  <link rel="dns-prefetch" href="https://api.maptiler.com">
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="dns-prefetch" href="https://unpkg.com">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #FFD700; /* brand yellow — matches map loading colour */
    }
    #bb-map-wrap {
      width: 100%;
      height: 100%;
    }
    #map-shield {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.08);
    }
    #map-shield span {
      background: rgba(0,0,0,0.55);
      color: #fff;
      padding: 8px 16px;
      border-radius: 20px;
      font-family: 'Century Gothic', sans-serif;
      font-size: 13px;
      pointer-events: none;
    }
    /* Only show the shield on touch devices */
    @media (hover: hover) {
      #map-shield { display: none; }
    }
  </style>

</head>
<body>

<!-- Tap-to-interact overlay — prevents map swallowing scroll on mobile.
     Hidden automatically on desktop (hover: hover media query above).
     Dismissed by the user's first tap on mobile. -->
<div id="map-shield" aria-hidden="true">
  <span>Tap to interact with map</span>
</div>

<div id="bb-map-wrap"></div>

<script>
  // Dismiss the shield on first tap
  document.getElementById('map-shield').addEventListener('click', function () {
    this.remove();
  }, { once: true });
</script>

<script>
  // Read config from URL parameters
  // e.g. /map.html?region=cape-town&center=18.412,-33.937&zoom=13&pitch=60&bearing=180
  (function () {
    var p = new URLSearchParams(window.location.search);

    var centerRaw = p.get('center');
    var center;
    if (centerRaw) {
      var parts = centerRaw.split(',').map(Number);
      if (parts.length === 2 && !parts.some(isNaN)) center = parts;
    }

    var zoom    = p.has('zoom')    ? Number(p.get('zoom'))    : undefined;
    var pitch   = p.has('pitch')   ? Number(p.get('pitch'))   : undefined;
    var bearing = p.has('bearing') ? Number(p.get('bearing')) : undefined;

    window.BB_MAP_CONFIG = {
      region:  p.get('region') || 'national',
      center:  center          || [23.68, -29.92],
      zoom:    zoom,
      pitch:   pitch,
      bearing: bearing
    };

    // Remove undefined keys so hostel-map.js falls back to its own defaults
    Object.keys(window.BB_MAP_CONFIG).forEach(function(k) {
      if (window.BB_MAP_CONFIG[k] === undefined) delete window.BB_MAP_CONFIG[k];
    });
  }());
</script>

<script src="/assets/js/hostel-map.js" defer></script>

</body>
</html>
